services:
  db:
    image: mysql:8
    container_name: mysql_container
    restart: always
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"

  web:
    build: .
    container_name: flask_container
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "5000:5000"

volumes:
  mysql_data: