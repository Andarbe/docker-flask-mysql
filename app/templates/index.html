<!DOCTYPE html>
<html>
<head>
    <title>Order System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h2>New Order</h2>
    <form method="POST" action="/add">
        <input class="form-control mb-2" name="full_name" placeholder="Full Name" required>
        <input class="form-control mb-2" name="email" placeholder="Email" required>
        <input class="form-control mb-2" name="phone" placeholder="Phone">
        <input class="form-control mb-2" type="date" name="birth_date">
        <input class="form-control mb-2" type="date" name="order_date">
        <input class="form-control mb-2" name="total_amount" placeholder="Total Amount">
        <input class="form-control mb-2" name="payment_method" placeholder="Payment Method">
        <button class="btn btn-primary">Save</button>
    </form>
    <a href="/list" class="btn btn-success mt-3">View Data</a>
</body>
</html>
